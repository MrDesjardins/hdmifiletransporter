name: CI Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, nightly]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Install toolchains
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install CV
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y -o Acquire::Retries=3 libopencv-dev clang libclang-dev cmake

      - name: Install CV
        if: runner.os == 'macOS'
        run: |
          brew install opencv cmake pkg-config
          echo "LIBCLANG_PATH=/Library/Developer/CommandLineTools/usr/lib" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=/Library/Developer/CommandLineTools/usr/lib:$DYLD_FALLBACK_LIBRARY_PATH" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Run cargo check
        run: cargo check

  coverage:
    name: Test and Coverage
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable, nightly]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Install toolchains
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: llvm-tools-preview

      - name: Install CV
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y -o Acquire::Retries=3 libopencv-dev clang libclang-dev cmake

      - uses: Swatinem/rust-cache@v2

      - name: Download grcov
        run: |
          mkdir -p "${HOME}/.local/bin"
          curl -sL https://github.com/mozilla/grcov/releases/download/v0.8.10/grcov-x86_64-unknown-linux-gnu.tar.bz2 | tar jxf - -C "${HOME}/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Test Only
        run: cargo test
        if: matrix.rust != 'stable'

      - name: Test + Coverage
        run: bash ${GITHUB_WORKSPACE}/coverage_ci.sh
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          files: target/coverage/tests.lcov
          fail_ci_if_error: true
          verbose: true
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
      
